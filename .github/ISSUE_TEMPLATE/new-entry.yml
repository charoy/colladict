name: New entry proposal
description: Submit a proposed concept to the editorial board for discussion and possible acceptance
title: "[Entry] "
labels: ["entry-proposal"]
body:
  - type: dropdown
    id: language
    attributes:
      label: Submission language
      options:
        - English
        - Français
        - Deutsch
    validations:
      required: true
  - type: input
    id: term
    attributes:
      label: Proposed term
      placeholder: e.g. articulation work
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why should this entry exist?
      description: Explain why this concept should be accepted by the editorial board.
      placeholder: Relevance for CSCW, existing use, critical angle...
    validations:
      required: true
  - type: textarea
    id: short_definition
    attributes:
      label: Working definition
      description: Provide a provisional definition in a few lines.
      placeholder: One or two paragraphs are enough.
  - type: textarea
    id: authors
    attributes:
      label: Proposed authors or contributors
      description: List the names that should appear on the entry if it is accepted. They do not need to match GitHub accounts.
      placeholder: One name per line.
  - type: textarea
    id: references
    attributes:
      label: Starting references
      description: List a few texts, authors or corpora that should inform the entry.
      placeholder: Articles, books, authors...
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Variants, controversies, related entries, language issues, and so on.
  - type: textarea
    id: commitment
    attributes:
      label: Drafting commitment
      description: If the editorial board accepts the proposal, indicate whether you are ready to draft the entry within a limited time window and in which language or languages.
      placeholder: e.g. I can draft the entry in English within four weeks and help prepare a French version.
