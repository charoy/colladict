name: New entry
description: Propose a new concept for the critical dictionary of CSCW
title: "[Entry] "
labels: ["entry-proposal"]
body:
  - type: input
    id: term
    attributes:
      label: Proposed term
      placeholder: e.g. articulation work
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why should this entry exist?
      description: Explain why this concept matters for the dictionary.
      placeholder: Relevance for CSCW, existing use, critical angle...
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Starting references
      description: List a few texts, authors or corpora that should inform the entry.
      placeholder: Articles, books, authors...
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Variants, controversies, related entries, language issues, and so on.
