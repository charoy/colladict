name: Correction or debate
description: Flag a correction, omission or argued disagreement
title: "[Discussion] "
labels: ["discussion"]
body:
  - type: dropdown
    id: language
    attributes:
      label: Submission language
      options:
        - English
        - Français
        - Deutsch
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Entry or page concerned
      placeholder: e.g. Awareness
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Point to discuss
      description: Describe the problem, omission or disagreement precisely.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested direction
      description: If possible, suggest a reformulation, source or corrective direction.
  - type: textarea
    id: sources
    attributes:
      label: Sources or evidence
      description: Add references, examples or page links if relevant.
